name: Unit Tests

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: pnpm/action-setup@v5
        with:
          version: '10.32.1'

      - uses: actions/setup-node@v5
        with:
          node-version: '24'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm -r build

      # Hard gate: no Node-only builtin (child_process/fs/…) may be statically imported by a
      # browser-facing @aastar/sdk subpath. Guards against regressions like the 0.42.0
      # node:child_process leak into @aastar/sdk/operator that broke downstream browser builds.
      - name: Check browser-safe subpaths
        run: pnpm run check:browser

      # Reports config.{network}.json drift from @aastar/core CANONICAL_ADDRESSES
      # (the single source of truth for contract addresses). See P2.8.
      # ADVISORY for now (continue-on-error): there is known, documented drift
      # (config.op-sepolia.json is a stale OP-mainnet copy; a sepolia `pnts`
      # mismatch; a suspected canonical simpleAccountFactory typo) that needs
      # on-chain verification before reconciling. Flip to a hard gate (remove
      # continue-on-error) once `pnpm run check:addresses` passes clean.
      - name: Check contract-address consistency (advisory)
        continue-on-error: true
        run: pnpm run check:addresses

      - name: Run unit tests
        run: pnpm -r test
